{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header">
            <h3>Cadastro de Nota</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">
                            {{ field.label }}
                        </label>
                        {{ field }}
                    </div>
                {% endfor %}
                <button
                    type="submit" class="btn btn-success">
                    Salvar </button>
                <a href="{% url 'nota_lista' %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
