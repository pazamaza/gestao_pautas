{% extends 'base.html' %}

{% block title %}
Eliminar Resultado
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h3 class="mb-0">Eliminar Resultado</h3>
        </div>

        <div class="card-body">
            <p class="mb-4">
                Deseja eliminar o resultado de
                <strong>{{ object.aluno }}</strong>
                em
                <strong>{{ object.disciplina }}</strong>?
            </p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    Confirmar
                </button>
                <a href="{% url 'resultado_lista' %}" class="btn btn-secondary">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
