{% extends 'base.html' %}
{% block title %}Frequência{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header">
            <h3>Registo de Frequência</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">
                            {{ field.label }}</label>
                             {{ field }}
                             {% if field.errors %}
                            <div class="text-danger">
                            {{ field.errors }}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-success">
                    Salvar </button>
                <a href="{% url 'frequencia_lista' %}"
                   class="btn btn-secondary"> Cancelar </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
