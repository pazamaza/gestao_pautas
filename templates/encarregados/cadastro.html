{% extends 'base.html' %}
{% block title %}
Novo Encarregado
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header">
            <h3>Cadastrar Encarregado</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">
                            {{ field.label }}
                        </label>
                        {{ field }}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary"> Salvar</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
