{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-danger text-white">
            Confirmar Exclusão
        </div>

        <div class="card-body">
            <p>
                Tem certeza que deseja eliminar o aluno
                <strong>{{ object.nome }}</strong>?
            </p>

            <form method="post">
                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Sim, Eliminar
                </button>

                <a href="{% url 'aluno_lista' %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
