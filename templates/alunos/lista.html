{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between">
        <h2>Alunos</h2>
        <a href="{% url 'aluno_novo' %}"
           class="btn btn-primary">
            Novo Aluno </a>
    </div>
    <form method="get" class="mt-3">
        <input
    type="text"
    name="q"
    value="{{ request.GET.q }}"
    class="form-control"
    placeholder="Pesquisar aluno">
    </form>
    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>Processo</th>
                <th>Nome</th>
                <th>Turma</th>
                <th>Encarregado</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for aluno in alunos %}
            <tr>
                <td>{{ aluno.numero_processo }} </td>
                <td>{{ aluno.nome }}</td>
                <td>{{ aluno.turma }}</td>
                <td>{{ aluno.encarregado }}</td>
                <td>

    <a href="{% url 'aluno_detalhe' aluno.id %}"
       class="btn btn-info btn-sm"> Ver </a>
    <a href="{% url 'aluno_editar' aluno.id %}"
       class="btn btn-warning btn-sm"> Editar </a>
    <a href="{% url 'aluno_excluir' aluno.id %}"
       class="btn btn-danger btn-sm">Eliminar</a>
</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
