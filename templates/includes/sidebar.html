        header {
            background: #007BFF;
            color: white;

            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;

        }
        img {

            background: white;
            padding: 20px;

        footer {
            text-align: center;
            padding: 10px 0;
            background: #007BFF;
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
        }
