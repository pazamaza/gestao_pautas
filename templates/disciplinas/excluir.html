{% extends 'base.html' %}

{% block title %}
Eliminar Disciplina
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-danger text-white">

            <h3>Eliminar Disciplina</h3>

        </div>

        <div class="card-body">

            <p>

                Tem certeza que deseja eliminar a disciplina:

                <strong>{{ object.nome }}</strong>?

            </p>

            <form method="post">

                {% csrf_token %}

                <button
                    type="submit"
                    class="btn btn-danger">

                    Confirmar

                </button>

                <a href="{% url 'disciplina_lista' %}"
                   class="btn btn-secondary">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
