{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Gestão de Pautas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* O banner ocupa o topo */
        .login-banner {
            width: 100%;
            height: 500px;
            background-image: url('{% static "images/fundo_login.png" %}');
            background-size: cover;
            background-position: center;
        }

        /* O container do form sobe para cima do banner */
        .login-container {
            margin-top: -360px; /* Ajuste este valor para subir mais ou menos */
            z-index: 10;
            position: relative;
        }

        .card-header {
            background-color: #0d6efd !important; /* Cor que combina com o azul do banner */
        }
    </style>
</head>
<body class="bg-light">

    <!-- Banner no topo -->
    <div class="login-banner"></div>

    <!-- Container do Login -->
    <div class="container login-container" style="width: 980px; height: 100px" >
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header text-white text-center" >
                        <h3 class="mb-0">Gestão de Pautas</h3>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Utilizador</label>
                                {{ form.username }}
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Palavra-passe</label>
                                {{ form.password }}
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Entrar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
