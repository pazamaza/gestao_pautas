{% load static %}

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Pautas</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            padding:0;
            background:#f4f4f4;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        header{
            background:#0d6efd;
            color:white;
            padding:8px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .container{
            flex:1;
            width:100%;
            text-align:center;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        img{
            width:100%;
            height:calc(120vh - 160px);
            object-fit:cover;
            margin-top:0;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:blue;
            color:#0d6efd;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
        }

        .btn:hover{
            background:#e9ecef;
        }

        footer{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:6px;
        }
    </style>
</head>
<body>

<header>
    <h1>Sistema de Gestão de Pautas</h1>

    <a href="/accounts/login/" class="btn">
        Entrar
    </a>
</header>

<div class="container">
    <img src="{% static 'images/fundo_3.png' %}"
         alt="Imagem do Sistema" style="width: 1300px; height: 350px" >
</div>

<footer>
    <p>&copy; 2026 Sistema de Gestão de Pautas</p>
</footer>

</body>
</html>
