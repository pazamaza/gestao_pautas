{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Atribuições Docentes</h2>
    <a href="{% url 'atribuicao_nova' %}"
       class="btn btn-primary mb-3">
        Nova Atribuição </a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Professor</th>
                <th>Disciplina</th>
                <th>Turma</th>
            </tr>
        </thead>
        <tbody>
            {% for item in atribuicoes %}
            <tr>
                <td>{{ item.professor }}</td>
                <td>{{ item.disciplina }}</td>
                <td>{{ item.turma }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">
                    Nenhuma atribuição encontrada.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
