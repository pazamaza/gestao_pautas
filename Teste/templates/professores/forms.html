{% extends 'base.html' %}
{% block title %}Novo Professor{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header">
           <h3>Cadastro de Professor</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button
                    type="submit"
                    class="btn btn-success"> Salvar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
