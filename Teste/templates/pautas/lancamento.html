{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>

        Lançamento de Notas

    </h2>

    <form method="post">

        {% csrf_token %}

        {{ formset.management_form }}

        <table class="table">

            {% for form in formset %}

            <tr>

                <td>

                    {{ form.id }}

                </td>

                <td>

                    {{ form.mac }}

                </td>

                <td>

                    {{ form.npp }}

                </td>

                <td>

                    {{ form.npt }}

                </td>

            </tr>

            {% endfor %}

        </table>

        <button
            type="submit"
            class="btn btn-success">

            Salvar Todas

        </button>

    </form>

</div>

{% endblock %}
