{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Pauta da Turma {{ turma }}</h2>
    <form method="post">
        {% csrf_token %}
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Aluno</th>
                    <th>MAC</th>
                    <th>NPP</th>
                    <th>NPT</th>
                </tr>
            </thead>
            <tbody>
                {% for aluno in alunos %}
                <tr>
                    <td>
                        {{ forloop.counter }}
                    </td>
                    <td>
                        {{ aluno.nome }}
                    </td>
                    <td>
                        <input
                            type="number"
                            step="0.1"
                            min="0"
                            max="20"
                            class="form-control">
                    </td>
                    <td>
                        <input
                            type="number"
                            step="0.1"
                            min="0"
                            max="20"
                            class="form-control">
                    </td>
                    <td>
                        <input
                            type="number"
                            step="0.1"
                            min="0"
                            max="20"
                            class="form-control">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button
            type="submit"
            class="btn btn-success">
            Salvar Pauta
        </button>
    </form>
</div>
{% endblock %}
